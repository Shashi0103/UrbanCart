services:
  # ─── Backend API (Web Service) ───────────────────────────────────────────────
  - type: web
    name: urbancart-api
    runtime: node
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CLIENT_URL
        fromService:
          name: urbancart
          type: web
          property: host

  # ─── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: urbancart
    runtime: static
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: urbancart-api
          type: web
          property: host
